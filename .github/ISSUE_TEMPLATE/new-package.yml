name: New Package
description: Request to add a new package to the registry.
type: Task
labels:
  - needs-triage
  - kind/package
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your interest in adding a new package to the Pulumi Registry!

        **If your provider is published as a Pulumi package (a repo with a committed `schema.json`, including statically bridged Terraform providers), you don't need an issue: open a pull request directly.** See [Adding a Package](https://github.com/pulumi/registry#adding-a-package). It is a single-line entry in [`community-packages/package-list.json`](https://github.com/pulumi/registry/blob/master/community-packages/package-list.json); automated checks post a fact-sheet on the PR, and a Pulumi maintainer approves it.

        Use this issue for a provider that cannot be added by pull request: a **dynamically bridged** Terraform provider (consumed with `pulumi package add terraform-provider <name>`, with no provider repo or committed schema), a package you don't maintain, or to discuss before opening a PR. If the provider is company-maintained, please also complete the [Pulumi Registry Onboarding form](https://docs.google.com/forms/d/e/1FAIpQLSe8ohRL1PP00KTXEGPYawjY-PgrbxCH6Z88wBqxEDMa4hw2qw/viewform).
  - type: dropdown
    id: PackageType
    attributes:
      label: Package Type
      description: Type of the package (see https://www.pulumi.com/docs/iac/concepts/packages/).
      options:
        - Native Pulumi Provider
        - Terraform/OpenTofu Provider
        - Component
        - Other/Not sure
  - type: input
    id: PackageName
    attributes:
      label: Package Name
      description: Name of the package from the source.
      placeholder: Your package name
  - type: input
    id: RepositoryUrl
    attributes:
      label: Repository URL
      description: URL of the repository where the package can be found.
      placeholder: https://github.com/pulumi/pulumi-xyz
  - type: input
    id: Connection
    attributes:
      label: Connection to the Package
      description: How are you connected to the package? (e.g., maintainer, user, etc.)
      placeholder: I am a [maintainer/user/etc.] of the package.
  - type: textarea
    id: OtherInfo
    attributes:
      label: Other Information
      value: |
        Please provide any additional information or context that may be helpful in reviewing this request.
