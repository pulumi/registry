name: "Check Go"

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
        description: |
          The file path from the root of the repo to the go code to check. For example:

          	tools/resourcedocsgen/

          Path should be the root of a go module.
      extra-sparse-checkout:
        required: false
        type: string
        default: ""
        description: |
          Additional paths to include in the test job's sparse checkout, one per
          line, for tests that read repository files outside the module. For
          example, resourcedocsgen's delimiter guard reads themes/default/content.
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v7
      with:
         sparse-checkout: |
           ${{ inputs.path }}
           .golangci.yml
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: '${{ inputs.path }}/go.mod'
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.10.1
        working-directory: ${{ inputs.path }}
        args: --config $GITHUB_WORKSPACE/.golangci.yml

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v7
      with:
         sparse-checkout: |
           ${{ inputs.path }}
           ${{ inputs.extra-sparse-checkout }}
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: '${{ inputs.path }}/go.mod'
    - name: Run Tests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd $GITHUB_WORKSPACE/${{ inputs.path }}
        go test ./... -v
