# Runs after merge on master, where secrets (Pulumi ESC via OIDC) are safe because none of a
# contributor's code runs here. Rebuilds from the pinned commit SHA and refuses to publish if
# the content hash changed since it was locked, which guards against a tag moved after review.
name: Community package publish

on:
  push:
    branches: [master]
    paths:
      - community-packages/package-list.json

permissions: write-all # default permissions plus id-token: write, for ESC OIDC

env:
  ESC_ACTION_OIDC_AUTH: true
  ESC_ACTION_OIDC_ORGANIZATION: pulumi
  ESC_ACTION_OIDC_REQUESTED_TOKEN_TYPE: urn:pulumi:token-type:access_token:organization
  ESC_ACTION_ENVIRONMENT: github-secrets/pulumi-registry
  ESC_ACTION_EXPORT_ENVIRONMENT_VARIABLES: GITHUB_TOKEN=PULUMI_BOT_TOKEN

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: pulumi/esc-action@8afe12bb7bb3df0a599e5309ee429ff1079ba85f # v3
        id: esc-secrets
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/resourcedocsgen/go.mod

      - name: Rebuild from pinned SHA, record lock, generate content
        id: build
        run: python3 scripts/ci/community-package/cli.py publish --diff HEAD~1

      # One PR for the merge, titled for every entry it published. A single-entry PR keeps the
      # same title and per-provider branch the nightly and first-party flows use.
      - name: Open the publish PR
        if: steps.build.outputs.title != ''
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.esc-secrets.outputs.PULUMI_BOT_TOKEN }}
          committer: Pulumi Bot <bot@pulumi.com>
          author: Pulumi Bot <bot@pulumi.com>
          commit-message: ${{ steps.build.outputs.title }}
          title: ${{ steps.build.outputs.title }}
          body: ""
          branch: ${{ steps.build.outputs.branch }}

      - if: steps.pr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          merge-method: squash
          pull-request-number: ${{ steps.pr.outputs.pull-request-number }}
          repository: ${{ github.repository }}
          token: ${{ steps.esc-secrets.outputs.PULUMI_BOT_TOKEN }}
