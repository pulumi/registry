name: Test CI scripts
on:
  pull_request:
    paths:
      - 'scripts/ci/*.py'
  push:
    branches:
      - master
    paths:
      - 'scripts/ci/*.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Run tests
        run: python -m unittest discover -s scripts/ci -p 'test_*.py' -v
