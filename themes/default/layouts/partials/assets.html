<!--
  Loads the JS and CSS bundle for /registry pages. This site only serves
  /registry; the homepage redirects to /registry, and all marketing/blog
  styles have been removed.
-->

{{ $manifest := .Site.Data.asset_manifest }}
{{ if not $manifest }}
  {{ errorf "Asset manifest not found. Run 'make build-assets' before 'make serve'." }}
{{ end }}

{{- $bundleId := getenv "ASSET_BUNDLE_ID" -}}

<script src="{{ index $manifest "bundle.js" }}" defer></script>

{{- if $bundleId -}}
    <link rel="stylesheet" href="/registry/css/bundle-registry.{{ $bundleId }}.css">
{{- else -}}
    <link rel="stylesheet" href="{{ index $manifest "bundle.css" }}">
{{- end }}
